     M-9 Terraform - Create IAM User and Policies
    resource "aws_iam_user" "example_user" {
      name: "pathnex_user"
    }

     resource "aws_iam_policy" "example_policy" {
       name= "pathnex-policy"
       description = "policy for pathnex application"
       policy=jsonencode({
          version= "2012-10-17"
          statement=  [
            {
              action = "s3:listbucket"
              effect = "allow"
              resource = "arn:aws:s3:::pathnex-bucket"
            },
          ]
        })
      }
     M-9 kubernetes - deploy nginx with configmap and secrets
    apiversion: v1
    kind: configmap
    metedata:
    name: nginx-config
   data:
      nginx.config: |
        server {
        listen 80 ;
        server_name localhost;
        location / {
        root  /user/share/nginx/html;
        index index.html index.html;
      }
    }

  ---
  apiversion: v1
  kind: secret
  metadata:
    name: nginx-secret
   type: opaque
   data:
     password: cfghjvx466r43hghjgv=

   ---
   apiversion: app/v1
   kind: deployment
   metadata:
  name: pathnex-nginx
 spec:
    replicas: 2
    selector:
       matchlabels:
             app: pathnex-nginx
        spec:
           container:
              - name: nginx
                image: nginx
                volumemounts:
                      - mouthpath:  /etc/nginx/nginx/.cong
                        name: nginx-config
                        subpath: nginx.conf
                 volumes:
                    - name: nginx-config
                      configmap:
                        name: nginx-secret
                      - name: nginx-secret-
                        secret:
                          secretname: nginx-secret
