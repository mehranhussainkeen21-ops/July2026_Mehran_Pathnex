50   🔹 Shell Script — Check for Running Services
51   #!/bin/bash
52   services=("nginx" "docker" "httpd")
53   for service in "${services[@]}"
54   do
55     if systemctl is-active --quiet $service; then
56       echo "$service is running"
57     else
58       echo "$service is not running"
59     fi
60   done
