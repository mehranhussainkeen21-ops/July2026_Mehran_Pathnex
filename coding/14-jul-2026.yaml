     # day 14 - kubernetes advanced concepts & multi - environment deployment

     ##    ancible - setup nginx with reverse proxy

      ``` yaml
       -  name: set up nginx with reverse proxy
          host: all
          become: yes
          task:
             -name: install nginx
              yum:
              name: nginx
              state: present
       -  name: configure nginx as reverse proxy
          template:
            src: reverse-proxy.config.j2
            dest: /etc/nginx/config .d/reverse-proxy.config
       -  name: nginx
          state: restarted
          enable: yes
