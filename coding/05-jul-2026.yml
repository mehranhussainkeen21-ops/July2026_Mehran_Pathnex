51🔹 Ansible — Create User and Set Permissions
52- name: Create a new user
53  hosts: all
54  become: yes
55  tasks:
56    - name: Create user
57      user:
58        name: pathnex
59        state: present
60        shell: /bin/bash
61    - name: Set permissions for the user
62      file:
63        path: /home/pathnex
64        owner: pathnex
65        group: pathnex
66        mode: '0755'
