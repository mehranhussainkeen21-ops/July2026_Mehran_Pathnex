day 12 - scaling applications and automation
  ansible - setup auto-scaling group (ASG)
 - name set up auto scaling group
   hosts: all
   become: yes
   tasks:
     - name create launch configuration
       ec2-asg:
         name: pathnex-asg
         rigion: us-east-1
         launch-config-name: pathnex-launch-config
         min_size: 1
         max_size: 3
         desired_capacity: 2
         vpc_zone_identifier: subnet-12345678
  terraform - create a load balancer with EC2 Instances
 resource "AWS_1b" "pathnex-lb" {
   name               ="pathnex-1b"
   internal           =false
   load-balencer_type = "application"
   security_groups    = [aws_security_group.allow_ssh_http.id]
   subnets            = [aws_subnet.public.id]
  }
 resource "aws_instance" "pathnex_ec2" {
 ami            ="ami-0abcd1234abcd1234"
 instance_type  ="t2.micro"
 security_groups =[aws_security_group.allow_ssh_http.name]
 tags   ={
 name ="pathnex-ec2"
   }
 }
  Kubernetes - horizontal pod autoscaler (HPA) with load balancer
 apiversion: apps/v1
 kind: Deployment
 metadata:
    name:pathnex-web-app
 spec:
   replicas: 2
   selector:
    matchlabels:
      app: pathnex-web-app
   template:
      metadata:
         labels:
            app: pathnex-web-app
     spec:
       containers:
         - name: web
           image: nginx
           ports: 
              - containerport: 80
        ---
       apiversion: autoscaling/v2
       kind: horizontalpodautoscaler
       metadata:
          name: pathnex-web-app-hpa
       spec: 
         scaletargetref:
           appversion: apps/v1
           kind: deployment
           name: pathnex-web-app
         minreplicas: 1
         maxreplicas: 2
         targetcpuutilizationpercentage: 80
          jenkinsfile - impliment parallel stages
        pipeline {
           agent any
           stages {
               stage ('build&test') {
                   parallel {
                        stage ('build') {
                            steps {
                                echo 'building projects...'
                           }
                       }
                       stage ('test') {
                          steps {
                              echo 'developing project...'
                          }
                     }
                }
          }
             Gitlab CI/CD -Parallel job for build & test
          stages
            - build
            - test
            - display

         build:
             stage: build
             script:
               - docker build -t pathnex-web-app  .

         test:
            stage: test
            script:
               -  docker run pathnex-web-app npm test

          deploy:
            stage: deploy
            script:
              - kubectl apply -f kubernetes/deployment.yaml

           Docker
          # docker volumes
          FORM ubuntu
          VOLUME ["/opt/pathnex/data']

          # BASH command 
          docker volume create pathnex-volume
