     M-9 kubernetes - ingress with nginx controller
    apiversion: networking.k8s.io/v1
    kind: ingress 
     metadata:
       nginx.ingress.kubernetes.io/rewrite-target: /
    spec:
      rules:
         -host: pathnex.location
          http:
           paths:
            - path: /
              pathtype: prefix
              backend:
                 service:
                    name: pathnex-service
                    port:
                      number: 80
